version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    groups:
      production-deps:
        dependency-type: production
      development-deps:
        dependency-type: development

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:45"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
