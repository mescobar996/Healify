name: CI

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint + Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ─── Unit Tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: 'file:./test.db'
      NEXTAUTH_SECRET: 'ci-test-secret-not-real'
      NEXTAUTH_URL: 'http://localhost:3000'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: 'file:./test.db'

      - name: Run unit tests
        run: npm test -- --reporter=verbose --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: false

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    timeout-minutes: 20

    env:
      DATABASE_URL: 'file:./build.db'
      NEXTAUTH_SECRET: 'ci-build-secret-not-real'
      NEXTAUTH_URL: 'http://localhost:3000'
      # Stub required build-time env vars
      GITHUB_APP_ID: '0'
      GITHUB_APP_PRIVATE_KEY: 'stub'
      GITHUB_APP_INSTALLATION_ID: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx prisma generate && npx next build
        env:
          DATABASE_URL: 'file:./build.db'
          NEXTAUTH_SECRET: 'ci-build-secret-not-real'
          NEXTAUTH_URL: 'http://localhost:3000'
          SKIP_ENV_VALIDATION: 'true'

  # ─── Security (SCA) ────────────────────────────────────────────────────────
  security-sca:
    name: Security SCA (npm audit)
    runs-on: ubuntu-latest
    needs: [lint]
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production deps (fail on critical)
        run: npm audit --omit=dev --audit-level=critical

  # ─── E2E API Tests (no browser, no auth needed) ──────────────────────────
  e2e-api:
    name: E2E API Tests
    runs-on: ubuntu-latest
    needs: [build, security-sca]
    timeout-minutes: 20

    env:
      DATABASE_URL: 'file:./e2e.db'
      NEXTAUTH_SECRET: 'ci-e2e-secret-not-real'
      NEXTAUTH_URL: 'http://localhost:3000'
      GITHUB_APP_ID: '0'
      GITHUB_APP_PRIVATE_KEY: 'stub'
      GITHUB_APP_INSTALLATION_ID: '0'
      SKIP_ENV_VALIDATION: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client & push schema
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
        env:
          DATABASE_URL: 'file:./e2e.db'

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run API E2E tests
        run: npx playwright test --project=api --reporter=github
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  # ─── Browser E2E Tests (chromium + mobile) ────────────────────────────────
  e2e-browser:
    name: Browser E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    timeout-minutes: 25

    env:
      DATABASE_URL: 'file:./e2e-browser.db'
      NEXTAUTH_SECRET: 'ci-e2e-secret-not-real'
      NEXTAUTH_URL: 'http://localhost:3000'
      NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
      GITHUB_APP_ID: '0'
      GITHUB_APP_PRIVATE_KEY: 'stub'
      GITHUB_APP_INSTALLATION_ID: '0'
      SKIP_ENV_VALIDATION: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client & push schema
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
        env:
          DATABASE_URL: 'file:./e2e-browser.db'

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run browser E2E tests (chromium + mobile)
        run: npx playwright test --project=chromium --project=mobile --reporter=github
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-browser-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
