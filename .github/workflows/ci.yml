name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint + Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Validate Prisma schema
        run: npx prisma validate
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  # ─── Unit Tests ───────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: 'file:./test.db'
      NEXTAUTH_SECRET: 'ci-test-secret-not-real'
      NEXTAUTH_URL: 'http://localhost:3000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: 'file:./test.db'

      - name: Run unit tests
        run: npm test -- --reporter=verbose

  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]

    env:
      DATABASE_URL: 'file:./build.db'
      NEXTAUTH_SECRET: 'ci-build-secret-not-real'
      NEXTAUTH_URL: 'http://localhost:3000'
      # Stub required build-time env vars
      GITHUB_APP_ID: '0'
      GITHUB_APP_PRIVATE_KEY: 'stub'
      GITHUB_APP_INSTALLATION_ID: '0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx prisma generate && npx next build
        env:
          DATABASE_URL: 'file:./build.db'
          NEXTAUTH_SECRET: 'ci-build-secret-not-real'
          NEXTAUTH_URL: 'http://localhost:3000'
          SKIP_ENV_VALIDATION: 'true'

  # ─── E2E API Tests (no browser, no auth needed) ──────────────────────────
  e2e-api:
    name: E2E API Tests
    runs-on: ubuntu-latest
    needs: [build]

    env:
      DATABASE_URL: 'file:./e2e.db'
      NEXTAUTH_SECRET: 'ci-e2e-secret-not-real'
      NEXTAUTH_URL: 'http://localhost:3000'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client & push schema
        run: |
          npx prisma generate
          npx prisma db push --skip-generate
        env:
          DATABASE_URL: 'file:./e2e.db'

      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      - name: Run API E2E tests
        run: npx playwright test --project=api --reporter=github
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: 'http://localhost:3000'
